           </tr>

              <td><input type="password" name="pwd" required></td>
          </tr>
           <tr>

                   <input type="submit" value="Login" style="padding-left:15px;padding-right:15px;background-color:crimson;font-size:15px;color:white;border:none;border-radius:5px"  >
               </th>
           </tr>
       </table>
   </form>
{{ msg }}
