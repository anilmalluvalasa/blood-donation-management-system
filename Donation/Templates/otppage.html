<!DOCTYPE html>
<html>
<head>
    <title>OTP Verification</title>

    <style>
        body{
            background-color:#F4F8FB;
            font-family: Arial;
        }

        .box{
            width:300px;
            margin:120px auto;
            border:1px solid #ccc;
            border-radius:10px;
            background-color:white;
            padding:20px;
            text-align:center;
        }

        h2{
            color:green;
            margin-bottom:10px;
        }

        input{
            width:80%;
            padding:10px;
            margin-top:15px;
            border-radius:5px;
            border:1px solid gray;
            text-align:center;
            font-size:18px;
        }

        button{
            margin-top:20px;
            padding:10px 20px;
            background-color:green;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background-color:darkgreen;
        }

        .msg{
            color:red;
            margin-top:10px;
        }

        .note{
            font-size:14px;
            color:gray;
            margin-top:5px;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>OTP Verification</h2>

    <p class="note">Enter the OTP sent to your email</p>

    <form method="post">
        {% csrf_token %}

        <input type="text" name="otp" placeholder="Enter OTP" required>

        <br>
        <button type="submit">Verify</button>
    </form>

    <div class="msg">{{ msg }}</div>

</div>

</body>
